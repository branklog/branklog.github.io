<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 블랭크로그 | BlankLog</title>
    <style>
        /* 🎨 노란색 브랜드 테마 일괄 수정 구역 */
        :root {
            --point-color: #FFD700;       /* 메인과 통일한 비비드 옐로우 */
            --point-hover-color: #E6C200; /* 호버 및 강조용 딥 옐로우 */
            --bg-color: #0d1117;          /* 딥블랙 배경 */
            --card-bg-color: #161b22;     /* 카드 레이아웃 배경 */
            --border-color: #30363d;      /* 다크 그레이 라인 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); 
            color: #ecf0f1;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px; 
            display: none; 
        }

        .header-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #21262d;
        }

        .brand-logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo-area img {
            height: 28px;
            width: auto;
            display: block;
        }

        .brand-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .header-meta-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 5px;
        }

        .header-meta-line h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            color: #c9d1d9;
        }

        .header-meta-line h2 span {
            color: var(--point-color); /* 헤더 ID 노출 노란색 매핑 */
            font-weight: 700;
        }

        .timestamp {
            font-size: 13px;
            color: #8b949e;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.1fr 1.2fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #8b949e;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-zone {
            text-align: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            background: #21262d;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .profile-id {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 8px 0;
        }

        .profile-tag {
            font-size: 12px;
            color: var(--point-color); /* 블로그 타이틀 태그 노란색 적용 */
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            display: inline-block;
            max-width: 100%;
            box-sizing: border-box;
            word-break: break-all;
            line-height: 1.4;
            font-weight: 500;
        }

        .meta-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: var(--bg-color);
            border: 1px solid #21262d;
            padding: 12px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .jisu-display {
            text-align: center;
            padding: 10px 0;
        }

        .gauge-subtext {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 5px;
        }

        .main-grade-text {
            font-size: 32px;
            font-weight: 800;
            color: var(--point-color); /* 등급 텍스트 노란색 전환 */
            margin: 0 0 25px 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.25);
        }

        .circle-chart-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
        }

        .circle-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(var(--point-color) 0%, #21262d 0% 100%); /* 도넛 그래프 충전색 노란색으로 연동 */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease-in-out;
        }

        .circle-chart-inner {
            width: 110px;
            height: 110px;
            background: var(--card-bg-color);
            border-radius: 50%;
            display: flex;
