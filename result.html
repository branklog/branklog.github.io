<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 블랭크로그 | BlankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117; 
            color: #ecf0f1;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px; 
            display: none; 
        }

        .header-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #21262d;
        }

        .header-zone h2 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
        }

        .header-zone h2 span {
            color: #03cf5d;
        }

        .timestamp {
            font-size: 13px;
            color: #8b949e;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.1fr 1.2fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #8b949e;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-zone {
            text-align: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            background: #21262d;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 10px;
            border: 1px solid #30363d;
        }

        .profile-id {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 4px 0;
        }

        .profile-tag {
            font-size: 12px;
            color: #8b949e;
            background: #21262d;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .meta-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: #0d1117;
            border: 1px solid #21262d;
            padding: 12px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .jisu-display {
            text-align: center;
            padding: 10px 0;
        }

        .gauge-subtext {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 5px;
        }

        .main-grade-text {
            font-size: 32px;
            font-weight: 800;
            color: #03cf5d;
            margin: 0 0 25px 0;
            text-shadow: 0 0 15px rgba(3, 207, 93, 0.3);
        }

        .circle-chart-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
        }

        .circle-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#03cf5d 0%, #21262d 0% 100%); 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease-in-out;
        }

        .circle-chart-inner {
            width: 110px;
            height: 110px;
            background: #161b22;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .circle-score {
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
        }

        .circle-label {
            font-size: 11px;
            color: #8b949e;
            margin-top: 2px;
        }

        .analysis-status-badge {
            font-size: 13px;
            color: #8b949e;
            background: #0d1117;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #21262d;
            display: inline-block;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .post-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0d1117;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #21262d;
            transition: border-color 0.2s;
        }

        .post-item:hover {
            border-color: #30363d;
        }

        .post-badge {
            background: #21262d;
            color: #03cf5d;
            font-size: 12px;
            font-weight: 700;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .post-content {
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .post-content a {
            color: #c9d1d9;
            text-decoration: none;
            font-weight: 500;
        }

        .post-content a:hover {
            color: #03cf5d;
            text-decoration: underline;
        }

        .actions-zone {
            margin-top: 30px;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            transition: background 0.2s;
            border: 1px solid #30363d;
        }

        .back-btn:hover { background: #30363d; }

        .loader-wrapper {
            text-align: center;
            padding: 60px 0;
        }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #03cf5d; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div class="spinner"></div>
        <b style="color: #8b949e; font-size: 15px;">네이버 블로그 실시간 빅데이터 지표 분석 중...</b>
    </div>

    <div id="dashboard" class="dashboard-container">
        <div class="header-zone">
            <h2><span id="headerId">-</span> 블로그 분석 리포트</h2>
            <div id="currentTime" class="timestamp">-</div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <p class="card-title">ℹ️ 블로그 정보</p>
                <div class="profile-zone">
                    <div class="profile-avatar">📁</div>
                    <p id="displayId" class="profile-id">-</p>
                    <span class="profile-tag">미술·디자인·포트폴리오</span>
                </div>
                <div class="meta-stats">
                    <div class="stat-box">
                        <div class="stat-label">분석 데이터 소스</div>
                        <div class="stat-value" style="color: #03cf5d; font-size: 14px;">네이버 실시간 RSS</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">추적 포스팅 수</div>
                        <div id="collectedCount" class="stat-value">0개</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <p class="card-title">📈 지수 및 노출 분석</p>
                <div class="jisu-display">
