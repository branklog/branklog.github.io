<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 블랭크로그 | BlankLog</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6fa; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 480px; }
        .loading { font-size: 16px; color: #666; padding: 40px 0; text-align: center; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #03cf5d; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #ff4d4d; font-weight: bold; text-align: center; padding: 20px 0; }
        .blog-info { display: none; text-align: left; }
        h2 { font-size: 22px; font-weight: 700; text-align: center; margin-top: 0; margin-bottom: 25px; color: #111; }
        .info-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; }
        .info-label { color: #666; font-weight: 500; }
        .info-value { font-weight: 700; color: #222; }
        .grade-box { text-align: center; background: #eafbf1; padding: 24px; border-radius: 12px; margin: 20px 0; border: 1px solid #cbf3db; }
        .grade-title { font-size: 13px; color: #2b8a4e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 5px 0; }
        .grade-value { color: #03cf5d; font-size: 32px; font-weight: 800; margin: 0; }
        .section-title { font-size: 15px; font-weight: 700; color: #444; margin: 25px 0 10px 0; border-left: 4px solid #03cf5d; padding-left: 8px; }
        .post-list { list-style: none; padding: 0; margin: 0; }
        .post-item { padding: 12px 5px; border-bottom: 1px solid #f0f0f0; font-size: 14px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .post-item a { color: #333; text-decoration: none; font-weight: 500; }
        .post-item a:hover { color: #03cf5d; text-decoration: underline; }
        .back-btn { display: block; text-align: center; margin-top: 30px; padding: 12px; background: #f1f3f5; color: #495057; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; transition: background 0.2s; }
        .back-btn:hover { background: #e9ecef; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loading">
            <div class="spinner"></div>
            <b>블로그 지수를 실시간 분석 중입니다</b>
        </div>
        
        <div id="resultContent" class="blog-info">
            <h2>지수 분석 결과</h2>
            <div class="info-row">
                <span class="info-label">블로그 ID</span>
                <span id="displayId" class="info-value">-</span>
            </div>
            <div class="grade-box">
                <p class="grade-title">종합 분석 지수</p>
                <p id="blogGrade" class="grade-value">분석 중</p>
            </div>
            <div class="info-row" style="background: transparent; padding: 0 5px; margin-bottom: 20px;">
                <span class="info-label">데이터 분석 상태</span>
                <span id="postStatus" class="info-value" style="color: #03cf5d;">추정치</span>
            </div>
            <div class="section-title">최근 발행 포스팅 리스트</div>
            <ul id="postContainer" class="post-list"></ul>
        </div>
        <a href="index.html" class="back-btn">← 다른 아이디 조회하기</a>
    </div>

    <script>
        const exactDatabase = {
            "226_3333": "최적화 2단계", 
            "테스트아이디": "준최적화 5단계"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('blogId');

        if (!blogId) {
            document.getElementById('loader').innerHTML = "<span class='error-msg'>올바른 블로그 ID가 전달되지 않았습니다.</span>";
        } else {
            document.getElementById('displayId').innerText = blogId;
            fetchBlogRealData(blogId);
        }

        async function fetchBlogRealData(id) {
            // 🛠️ 주황색 버튼 승인이 필요 없는 새로운 대체 프록시 서버 적용!
            const proxyUrl = "https://api.allorigins.win/raw?url=";
            const targetUrl = encodeURIComponent(`https://rss.blog.naver.com/${id}.xml`);

            try {
                const response = await fetch(proxyUrl + targetUrl);
                if (!response.ok) throw new Error("블로그를 찾을 수 없습니다.");
                
                const textData = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(textData, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");

                if (items.length === 0) {
                    document.getElementById('loader').innerHTML = "<span class='error-msg'>존재하지 않는 아이디이거나 글이 없는 블로그입니다.</span>";
                    return;
                }

                let postHtml = "";
                for (let i = 0; i < Math.min(items.length, 3); i++) {
                    const title = items[i].getElementsByTagName("title")[0].textContent;
                    const link = items[i].getElementsByTagName("link")[0].textContent;
                    postHtml += `<li class="post-item"><a href="${link}" target="_blank">📄 ${title}</a></li>`;
                }

                let grade = "일반";
                let statusText = "추정치";
                const lowerId = id.toLowerCase();

                if (exactDatabase[lowerId]) {
                    grade = exactDatabase[lowerId];
                    statusText = "분석 완료 (정확)";
                } else {
                    const totalPosts = items.length;
                    if (totalPosts >= 18) {
                        grade = "최적화 1단계 (추정)";
                    } else if (totalPosts >= 10) {
                        grade = "준최적화 5단계 (추정)";
                    } else if (totalPosts >= 5) {
                        grade = "준최적화 3단계 (추정)";
                    } else {
                        grade = "일반 블로그";
                    }
                }

                document.getElementById('postContainer').innerHTML = postHtml;
                document.getElementById('blogGrade').innerText = grade;
                document.getElementById('postStatus').innerText = statusText;
                
                document.getElementById('loader').style.display = "none";
                document.getElementById('resultContent').style.display = "block";

            } catch (error) {
                document.getElementById('loader').innerHTML = "<span class='error-msg'>네이버 데이터 수집 중 일시적인 통신 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</span>";
            }
        }
    </script>
</body>
</html>
