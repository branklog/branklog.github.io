<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B랭크로그 통합 분석 리포트</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117; 
            color: #ecf0f1;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container { width: 100%; max-width: 1100px; display: none; }
        .header-zone { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #21262d; }
        .brand-logo-area { display: flex; align-items: center; gap: 10px; }
        .brand-logo-area img { height: 28px; width: auto; display: block; }
        .brand-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #ffffff; text-transform: uppercase; }
        .header-meta-line { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 5px; }
        .header-meta-line h2 { font-size: 16px; font-weight: 600; margin: 0; color: #c9d1d9; }
        .header-meta-line h2 span { font-weight: 700; }
        .timestamp { font-size: 13px; color: #8b949e; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1.1fr 1.2fr; gap: 20px; }
        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .card-title { font-size: 14px; font-weight: 600; color: #8b949e; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
        .profile-zone { text-align: center; padding: 10px 0 20px 0; border-bottom: 1px solid #21262d; margin-bottom: 20px; }
        .profile-avatar { width: 50px; height: 50px; background: #21262d; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 10px; border: 1px solid #30363d; }
        .profile-id { font-size: 18px; font-weight: 700; color: #ffffff; margin: 0 0 8px 0; }
        .profile-tag { font-size: 12px; padding: 6px 14px; border-radius: 6px; display: inline-block; max-width: 100%; box-sizing: border-box; word-break: break-all; line-height: 1.4; font-weight: 500; }

        .meta-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; }
        .stat-box { background: #0d1117; border: 1px solid #21262d; padding: 12px; border-radius: 8px; }
        .stat-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 700; color: #ffffff; }

        .jisu-display { text-align: center; padding: 5px 0; }
        .gauge-subtext { font-size: 12px; color: #8b949e; margin-bottom: 5px; }
        .main-grade-text { font-size: 32px; font-weight: 800; margin: 0 0 20px 0; }
        .circle-chart-wrapper { position: relative; width: 130px; height: 130px; margin: 0 auto 15px auto; }
        .circle-chart { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#21262d 0% 100%); display: flex; align-items: center; justify-content: center; transition: background 0.5s ease-in-out; }
        .circle-chart-inner { width: 102px; height: 102px; background: #161b22; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .circle-score { font-size: 24px; font-weight: 800; color: #ffffff; }
        .circle-label { font-size: 11px; color: #8b949e; margin-top: 1px; }
        .actions-zone { margin-top: 30px; text-align: center; }
        .back-btn { display: inline-block; padding: 12px 24px; background: #21262d; color: #c9d1d9; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; border: 1px solid #30363d; transition: background 0.2s; }
        .back-btn:hover { background: #30363d; }
        
        .post-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .post-item { display: flex; justify-content: space-between; align-items: center; background: #0d1117; padding: 14px 16px; border-radius: 10px; border: 1px solid #21262d; box-sizing: border-box; }
        .post-left-box { display: flex; align-items: center; overflow: hidden; max-width: 80%; }
        .post-badge { color: #ffffff; font-size: 12px; font-weight: 700; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .post-content { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; margin-left: 12px; }
        .post-content a { color: #c9d1d9; text-decoration: none; font-weight: 500; }
        .post-date-label { color: #8b949e; font-size: 12px; flex-shrink: 0; margin-left: 10px; font-family: monospace; }

        .loader-wrapper { text-align: center; padding: 60px 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div class="spinner" id="mainSpinner"></div>
        <b id="loaderText" style="color: #8b949e; font-size: 15px;">네이버 실시간 빅데이터 지표 분석 중...</b>
    </div>

    <div id="dashboard" class="dashboard-container">
        <div class="header-zone">
            <div class="brand-logo-area">
                <img src="logo.svg" alt="BrankLog Logo">
                <span class="brand-text">Brank<span id="logoDot">-</span></span>
            </div>
            <div class="header-meta-line">
                <h2><span id="headerId">-</span> <span id="headerType">분석 리포트</span></h2>
                <div id="currentTime" class="timestamp">-</div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <p class="card-title" id="infoTitle">ℹ️ 로딩 정보</p>
                <div class="profile-zone">
                    <div class="profile-avatar" id="avatarIcon">📁</div>
                    <p id="displayId" class="profile-id">-</p>
                    <span id="mainGreetingTag" class="profile-tag">-</span>
                </div>
                <div class="meta-stats">
                    <div class="stat-box">
                        <div class="stat-label" id="sourceLabel">데이터 출처</div>
                        <div id="realtimeDataSource" class="stat-value" style="font-size: 13px;">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label" id="countLabel">통계 지표</div>
                        <div id="collectedCount" class="stat-value">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <p class="card-title">📈 지수 및 매칭 분석</p>
                <div class="jisu-display">
                    <p class="gauge-subtext" id="gaugeSubLabel">종합 활성화 등급</p>
                    <p id="mainGrade" class="main-grade-text">-</p>
                     
                    <div class="circle-chart-wrapper">
                        <div id="circleChart" class="circle-chart">
                            <div class="circle-chart-inner">
                                <span id="circleScore" class="circle-score">0점</span>
                                <span class="circle-label" id="circleLabelText">가중치 스코어</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="formula-notice-box">
                    <p class="formula-title">📋 가중치 산출 근거 안내</p>
                    <p class="formula-text" id="noticeBody">-</p>
                </div>
            </div>

            <div class="card">
                <p class="card-title" id="listTitle">🔥 최신 핵심 데이터 리스트</p>
                <ul id="postContainer" class="post-list"></ul>
            </div>
        </div>

        <div class="actions-zone">
            <a href="index.html" id="backBtn" class="back-btn">← 다른 정보 조회하기</a>
        </div>
    </div>

    <script>
        const now = new Date();
        const formattedDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        document.getElementById('currentTime').innerText = formattedDate;

        // 🟢 블로그 분석 엔진
        async function fetchBlogRealData(id) {
            const proxyUrl = "https://corsproxy.io/?";
            const targetUrl = encodeURIComponent(`https://rss.blog.naver.com/${id}.xml`);

            try {
                const response = await fetch(proxyUrl + targetUrl);
                if (!response.ok) throw new Error();
                const textData = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(textData, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");
                const totalPosts = items.length;

                if (totalPosts === 0) throw new Error();

                let postHtml = "";
                let totalTitleLength = 0;
                let activeMonthPosts = 0; 
                let dates = [];
                const thirtyDaysAgo = new Date();
                thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

                for (let i = 0; i < Math.min(totalPosts, 5); i++) {
                    const title = items[i].getElementsByTagName("title")[0].textContent;
                    const link = items[i].getElementsByTagName("link")[0].textContent;
                    const pubDateStr = items[i].getElementsByTagName("pubDate")[0].textContent;
                    const pDate = new Date(pubDateStr);
                    totalTitleLength += title.length;
                    dates.push(pDate);

                    if (pDate >= thirtyDaysAgo) activeMonthPosts++;

                    const yy = String(pDate.getFullYear()).slice(-2);
                    const mm = String(pDate.getMonth() + 1).padStart(2, '0');
                    const dd = String(pDate.getDate()).padStart(2, '0');
                    
                    postHtml += `
                        <li class="post-item">
                            <div class="post-left-box">
                                <div class="post-badge" style="background:#21262d; color:#03cf5d;">${i+1}</div>
                                <div class="post-content"><a href="${link}" target="_blank" style="color:#c9d1d9;">${title}</a></div>
                            </div>
                            <span class="post-date-label">${yy}.${mm}.${dd}</span>
                        </li>`;
                }

                document.getElementById('collectedCount').innerText = `${activeMonthPosts}개`;
                
                let score = 15;
                if (activeMonthPosts >= 6) score += 40;     
                else if (activeMonthPosts >= 3) score += 30; 
                else if (activeMonthPosts >= 1) score += 15; 

                const avgTitleLength = totalTitleLength / Math.min(totalPosts, 5);
                if (avgTitleLength >= 25) score += 25; 
                else score += 15;

                let grade = "분석 일반";
                if (score >= 70) grade = "최적화 등급";     
                else if (score >= 45) grade = "준최 최상위"; 

                document.getElementById('circleScore').innerText = `${score}점`;
                document.getElementById('circleChart').style.background = `conic-gradient(#03cf5d ${score}%, #21262d ${score}% 100%)`;
                document.getElementById('mainGrade').innerText = grade;
                document.getElementById('postContainer').innerHTML = postHtml;

                document.getElementById('loader').style.display = "none";
                document.getElementById('dashboard').style.display = "block";

            } catch (error) {
                showFallbackUI(id, "blog");
            }
        }

        // 🔵 [100% 리얼 데이터 매핑] 네이버 통합검색 결과 전면 실시간 크롤링 엔진
        async function searchPlaceEngine(storeName) {
            // 브라우저 CORS 차단 필터를 무력화하고 네이버 웹검색 생데이터를 읽어오는 통합 터널 구축
            const searchUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://search.naver.com/search.naver?query=' + encodeURIComponent(storeName))}`;

            try {
                const response = await fetch(searchUrl);
                if (!response.ok) throw new Error();
                const wrapperData = await response.json();
                const htmlSource = wrapperData.contents;

                // 1️⃣ 뼈대에서 네이버 플레이스 고유 ID 정밀 추출
                const idMatch = htmlSource.match(/data-id="([0-9]+)"/i) || htmlSource.match(/places\/([0-9]+)/i) || htmlSource.match(/data-place-id="([0-9]+)"/i);
                if (!idMatch) {
                    document.getElementById('loader').innerHTML = "<span style='color:#ff6b6b; font-weight:bold;'>해당 상호명은 네이버 플레이스에 정식 등록되지 않은 매장입니다.</span>";
                    return;
                }
                const realPlaceId = idMatch[1];

                // 2️⃣ 두 번째 정밀 보안 우회 터널을 열어 플레이스 상세 JSON 통계 원본을 실시간 직접 도킹
                const detailApiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://m.place.naver.com/v1/places/' + realPlaceId + '/detail')}`;
                const detailResponse = await fetch(detailApiUrl);
                if (!detailResponse.ok) throw new Error();
                const detailWrapper = await detailResponse.json();
                const realJson = JSON.parse(detailWrapper.contents);

                // 📍 가짜 계산 싹 다 삭제, 100% 네이버 포털 원본 실시간 매칭
                const placeName = realJson.name || storeName;
                const visitorReviewCount = parseInt(realJson.visitorReviews?.total || 0);
                const blogReviewCount = parseInt(realJson.blogReviews?.total || 0);
                const totalReviews = visitorReviewCount + blogReviewCount;
                const placeAddress = realJson.address || realJson.roadAddress || "등록 정보 없음";
                const placeCategory = realJson.category || "오프라인 업종";

                // 상단 매칭 렌더링
                document.getElementById('headerId').innerText = placeName;
                document.getElementById('displayId').innerText = placeName;
                document.getElementById('collectedCount').innerText = `${totalReviews}개`;
                document.getElementById('mainGreetingTag').innerText = `업종분야: ${placeCategory}`;

                // 통계 비례 스코어 계산식
                let placeScore = 20;
                let placeGrade = "인지도 성장기";
                if (totalReviews > 300) { placeScore = 95; placeGrade = "파워 핫플레이스"; }
                else if (totalReviews > 80) { placeScore = 75; placeGrade = "지역 활성 매장"; }
                else if (totalReviews > 10) { placeScore = 50; }

                document.getElementById('circleScore').innerText = `${placeScore}점`;
                document.getElementById('circleChart').style.background = `conic-gradient(#388bfd ${placeScore}%, #21262d ${placeScore}% 100%)`;
                document.getElementById('mainGrade').innerText = placeGrade;

                // 3️⃣ 포털 내부 새소식 리스트 연동 및 날짜 추출
                let noticeHtml = "";
                const notices = realJson.announcements || [];

                if (notices.length > 0) {
                    for (let i = 0; i < Math.min(notices.length, 3); i++) {
                        const nTitle = notices[i].title;
                        const pDate = new Date(notices[i].date);
                        const yy = String(pDate.getFullYear()).slice(-2);
                        const mm = String(pDate.getMonth() + 1).padStart(2, '0');
                        const dd = String(pDate.getDate()).padStart(2, '0');

                        noticeHtml += `
                            <li class="post-item">
                                <div class="post-left-box">
                                    <div class="post-badge" style="background:#21262d; color:#388bfd;">📢</div>
                                    <div class="post-content"><span style="color:#c9d1d9; font-weight:500;">${nTitle}</span></div>
                                </div>
                                <span class="post-date-label">${yy}.${mm}.${dd}</span>
                            </li>`;
                    }
                } else {
                    noticeHtml = `
                        <li class="post-item" style="justify-content: center; padding: 18px; color:#8b949e; font-size:13px;">
                            네이버 플레이스에 등록된 실시간 공지 새소식이 없습니다.
                        </li>`;
                }

                // 4️⃣ 기획 가이드 최종 하드웨어 프레임 주입 (가짜 난수 완전 청소)
                document.getElementById('postContainer').innerHTML = `
                    <li class="post-item" style="border-left: 4px solid #388bfd;">
                        <div class="post-left-box">
                            <div class="post-badge" style="background:#21262d; color:#388bfd;">🆔</div>
                            <div class="post-content"><span style="color:#8b949e;">플레이스 고유 식별 ID</span></div>
                        </div>
                        <span style="color:#ffffff; font-weight:bold; font-size:13px; font-family:monospace;">${realPlaceId}</span>
                    </li>
                    <li class="post-item" style="border-left: 4px solid #f1c40f;">
                        <div class="post-left-box">
                            <div class="post-badge" style="background:#21262d; color:#f1c40f;">📍</div>
                            <div class="post-content"><span style="color:#8b949e;">매장 등록 지번/도로명 주소</span></div>
                        </div>
                        <span style="color:#ffffff; font-weight:500; font-size:12px;">${placeAddress}</span>
                    </li>
                    <li class="post-item" style="border-left: 4px solid #03cf5d;">
                        <div class="post-left-box">
                            <div class="post-badge" style="background:#21262d; color:#03cf5d;">✔</div>
                            <div class="post-content"><span style="color:#8b949e;">방문자 영수증 리뷰 총량</span></div>
                        </div>
                        <span style="color:#ffffff; font-weight:bold; font-size:13px;">${Number(visitorReviewCount).toLocaleString()}건</span>
                    </li>
                    <li class="post-item" style="border-left: 4px solid #a438fd; margin-bottom: 20px;">
                        <div class="post-left-box">
                            <div class="post-badge" style="background:#21262d; color:#a438fd;">✍</div>
                            <div class="post-content"><span style="color:#8b949e;">연동된 블로그 리뷰 포스팅</span></div>
                        </div>
                        <span style="color:#ffffff; font-weight:bold; font-size:13px;">${Number(blogReviewCount).toLocaleString()}건</span>
                    </li>
                    <li style="list-style: none; padding: 0; margin: 15px 0 5px 0; font-size: 12px; color: #8b949e; font-weight: 600; text-align: left;">
                        📢 플레이스 실시간 등록 새소식 (발행 날짜 포함)
                    </li>
                    ${noticeHtml}
                `;

                document.getElementById('loader').style.display = "none";
                document.getElementById('dashboard').style.display = "block";

            } catch (error) {
                showFallbackUI(storeName, "place");
            }
        }

        function showFallbackUI(target, type) {
            document.getElementById('collectedCount').innerText = "제한됨";
            document.getElementById('circleScore').innerText = "- 점";
            document.getElementById('circleChart').style.background = "#21262d";
            
            if (type === "place") {
                document.getElementById('mainGrade').innerText = "연동 정체";
                document.getElementById('mainGrade').style.color = "#ff6b6b";
                document.getElementById('postContainer').innerHTML = `
                    <li class="post-item" style="justify-content: center; padding:20px; border: 1px dashed #ff6b6b;">
                        <div class="post-content" style="text-align: center;"><a href="https://search.naver.com/search.naver?query=${encodeURIComponent(target)}" target="_blank" style="color:#ff6b6b; font-weight:bold;">⚠️ 실시간 네트워크 파싱 통로 지연 (포털 직접 조회)</a></div>
                    </li>`;
            } else {
                document.getElementById('mainGrade').innerText = "분석 지연";
                document.getElementById('postContainer').innerHTML = `
                    <li class="post-item" style="justify-content: center; padding:20px;">
                        <div class="post-content" style="text-align: center;"><a href="https://blog.naver.com/${target}" target="_blank">⚠️ RSS 데이터 피드 응답 지연 (블로그 직접 조회)</a></div>
                    </li>`;
            }
            document.getElementById('loader').style.display = "none";
            document.getElementById('dashboard').style.display = "block";
        }

        // 주소창 파라미터 감지 및 선제적 데이터 레이아웃 강제 빌드 구역
        const urlParams = new URLSearchParams(window.location.search);
        const rawBlogId = urlParams.get('blogId');
        const blogId = rawBlogId ? decodeURIComponent(rawBlogId).trim() : null;
        const rawPlaceQuery = urlParams.get('placeQuery');
        const placeQuery = rawPlaceQuery ? decodeURIComponent(rawPlaceQuery).trim() : null;

        if (placeQuery) {
            document.getElementById('mainSpinner').style.borderLeftColor = "#388bfd";
            document.getElementById('loaderText').innerText = "네이버 스마트플레이스 분석 리포트 생성 중...";
            document.getElementById('logoDot').innerText = "Log(Place).";
            document.getElementById('logoDot').style.color = "#388bfd";
            document.getElementById('headerType').innerHTML = `<span style="color:#388bfd;">플레이스 마케팅 지수 리포트</span>`;
            document.getElementById('infoTitle').innerText = "📍 플레이스 요약 정보";
            document.getElementById('avatarIcon').innerText = "📍";
            document.getElementById('sourceLabel').innerText = "데이터 파싱 소스";
            document.getElementById('realtimeDataSource').innerText = "네이버 스마트플레이스";
            document.getElementById('realtimeDataSource').style.color = "#388bfd";
            document.getElementById('countLabel').innerText = "등록 리뷰 총합";
            document.getElementById('gaugeSubLabel').innerText = "종합 매장 인지도 등급";
            document.getElementById('mainGrade').style.color = "#388bfd";
            document.getElementById('listTitle').innerText = "🔥 실시간 매장 마케팅 요약";
