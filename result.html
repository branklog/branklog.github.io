<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 블랭크로그 | BlankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117; 
            color: #ecf0f1;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px; 
            display: none; 
        }

        /* 🎨 상단 로고와 타이틀을 위한 헤더 그리드 구역 */
        .header-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #21262d;
        }

        .brand-logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo-area img {
            height: 28px;
            width: auto;
            display: block;
        }

        .brand-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .header-meta-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 5px;
        }

        .header-meta-line h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            color: #c9d1d9;
        }

        .header-meta-line h2 span {
            color: #03cf5d;
            font-weight: 700;
        }

        .timestamp {
            font-size: 13px;
            color: #8b949e;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.1fr 1.2fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #8b949e;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-zone {
            text-align: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 50px;
            height: 50px;
            background: #21262d;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 10px;
            border: 1px solid #30363d;
        }

        .profile-id {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 8px 0;
        }

        /* 🛠️ 블로그 인사말(타이틀)이 예쁘게 담기는 반응형 태그 */
        .profile-tag {
            font-size: 12px;
            color: #03cf5d;
            background: rgba(3, 207, 93, 0.1);
            border: 1px solid rgba(3, 207, 93, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            display: inline-block;
            max-width: 100%;
            box-sizing: border-box;
            word-break: break-all;
            line-height: 1.4;
            font-weight: 500;
        }

        .meta-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: #0d1117;
            border: 1px solid #21262d;
            padding: 12px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .jisu-display {
            text-align: center;
            padding: 10px 0;
        }

        .gauge-subtext {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 5px;
        }

        .main-grade-text {
            font-size: 32px;
            font-weight: 800;
            color: #03cf5d;
            margin: 0 0 25px 0;
            text-shadow: 0 0 15px rgba(3, 207, 93, 0.3);
        }

        .circle-chart-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
        }

        .circle-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#03cf5d 0%, #21262d 0% 100%); 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease-in-out;
        }

        .circle-chart-inner {
            width: 110px;
            height: 110px;
            background: #161b22;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .circle-score {
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
        }

        .circle-label {
            font-size: 11px;
            color: #8b949e;
            margin-top: 2px;
        }

        .analysis-status-badge {
            font-size: 13px;
            color: #8b949e;
            background: #0d1117;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #21262d;
            display: inline-block;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .post-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0d1117;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #21262d;
        }

        .post-badge {
            background: #21262d;
            color: #03cf5d;
            font-size: 12px;
            font-weight: 700;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .post-content {
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .post-content a {
            color: #c9d1d9;
            text-decoration: none;
            font-weight: 500;
        }

        .post-content a:hover {
            color: #03cf5d;
            text-decoration: underline;
        }

        .actions-zone {
            margin-top: 30px;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .loader-wrapper {
            text-align: center;
            padding: 60px 0;
        }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #03cf5d; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div class="spinner"></div>
        <b style="color: #8b949e; font-size: 15px;">네이버 블로그 실시간 빅데이터 지표 분석 중...</b>
    </div>

    <div id="dashboard" class="dashboard-container">
        
        <div class="header-zone">
            <div class="brand-logo-area">
                <img src="logo.svg" alt="BlankLog Logo">
                <span class="brand-text">Blank<span style="color: #03cf5d;">Log.</span></span>
            </div>
            <div class="header-meta-line">
                <h2><span id="headerId">-</span> 님 분석 리포트</h2>
                <div id="currentTime" class="timestamp">-</div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <p class="card-title">ℹ️ 블로그 정보</p>
                <div class="profile-zone">
                    <div class="profile-avatar">📁</div>
                    <p id="displayId" class="profile-id">-</p>
                    <span id="blogGreeting" class="profile-tag">네이버 블로그</span>
                </div>
                <div class="meta-stats">
                    <div class="stat-box">
                        <div class="stat-label">분석 데이터 소스</div>
                        <div class="stat-value" style="color: #03cf5d; font-size: 14px;">네이버 실시간 RSS</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">당월 활성 포스팅</div>
                        <div id="collectedCount" class="stat-value">0개</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <p class="card-title">📈 지수 및 노출 분석</p>
                <div class="jisu-display">
                    <p class="gauge-subtext">종합 분석 지수 판정</p>
                    <p id="blogGrade" class="main-grade-text">분석 일반</p>
                    
                    <div class="circle-chart-wrapper">
                        <div id="circleChart" class="circle-chart">
                            <div class="circle-chart-inner">
                                <span id="circleScore" class="circle-score">0점</span>
                                <span class="circle-label">노출 가중치</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="analysis-status-badge">
                        노출 상태 상태: <span id="statusText" style="color:#03cf5d; font-weight:700;">정상</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <p class="card-title">🔥 최근 핵심 분석 포스팅</p>
                <ul id="postContainer" class="post-list"></ul>
            </div>
        </div>

        <div class="actions-zone">
            <a href="index.html" class="back-btn">← 다른 아이디 조회하기</a>
        </div>
    </div>

    <script>
        const now = new Date();
        const formattedDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        document.getElementById('currentTime').innerText = formattedDate;

        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('blogId');

        if (!blogId) {
            document.getElementById('loader').innerHTML = "<span style='color:#ff6b6b; font-weight:bold;'>올바른 블로그 ID가 전달되지 않았습니다.</span>";
        } else {
            document.getElementById('displayId').innerText = blogId;
            document.getElementById('headerId').innerText = blogId;
            fetchBlogRealData(blogId);
        }

        async function fetchBlogRealData(id) {
            const proxyUrl = "https://api.allorigins.win/raw?url=";
            const targetUrl = encodeURIComponent(`https://rss.blog.naver.com/${id}.xml`);

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000); 

            try {
                const response = await fetch(proxyUrl + targetUrl, { signal: controller.signal });
                clearTimeout(timeoutId); 
                
                if (!response.ok) throw new Error("네이버 응답 지연");
                
                const textData = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(textData, "text/xml");
                
                // 🛠️ 진짜 블로그 상단 인사말(Title)을 뽑아내는 정밀 장치
                const channelDoc = xmlDoc.getElementsByTagName("channel")[0];
                let realGreeting = "네이버 블로그";
                if (channelDoc) {
                    const titleNode = channelDoc.getElementsByTagName("title")[0];
                    if (titleNode && titleNode.textContent.trim().length > 0) {
                        // "아이디님의 블로그 : 네이버 블로그" 형태로 들어오는 네이버 기본 꼬리표 삭제 가공
                        realGreeting = titleNode.textContent.replace(" : 네이버 블로그", "").trim();
                        // 22자 이상 너무 길어지면 박스가 터지므로 말줄임표 처리
                        if (realGreeting.length > 22) realGreeting = realGreeting.substring(0, 20) + "...";
                    }
                }

                const items = xmlDoc.getElementsByTagName("item");
                const totalPosts = items.length;

                if (totalPosts === 0) throw new Error("데이터 공백");

                let postHtml = "";
                let totalTitleLength = 0;
                let activeMonthPosts = 0; 
                let dates = [];
                const thirtyDaysAgo = new Date();
                thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

                for (let i = 0; i < Math.min(totalPosts, 5); i++) {
                    const title = items[i].getElementsByTagName("title")[0].textContent;
                    const link = items[i].getElementsByTagName("link")[0].textContent;
                    const pubDateStr = items[i].getElementsByTagName("pubDate")[0].textContent;
                    const pDate = new Date(pubDateStr);
                    
                    totalTitleLength += title.length;
                    dates.push(pDate);

                    if (pDate >= thirtyDaysAgo) {
                        activeMonthPosts++;
                    }

                    postHtml += `
                        <li class="post-item">
                            <div class="post-badge">${i+1}</div>
                            <div class="post-content"><a href="${link}" target="_blank">${title}</a></div>
                        </li>`;
                }

                document.getElementById('collectedCount').innerText = `${activeMonthPosts}개`;
                document.getElementById('blogGreeting').innerText = realGreeting; // 실시간 인사말 주입

                // 📊 [한 달 가중치 초정밀 계산식]
                let score = 0;

                // 1지표: 당월 활성 포스팅 볼륨 (최대 40점)
                if (activeMonthPosts >= 8) score += 40;     
                else if (activeMonthPosts >= 4) score += 25; 
                else if (activeMonthPosts >= 1) score += 10; // hoja1 방어 완료 (최근 글이 적으면 과락)
                else score += 5;

                // 2지표: 콘텐츠 밀도 (최대 30점)
                const avgTitleLength = totalTitleLength / Math.min(totalPosts, 5);
                if (avgTitleLength >= 40) score += 30; 
                else if (avgTitleLength >= 23) score += 20;
                else score += 10;

                // 3지표: 발행 성실도 주기 (최대 30점)
                if (dates.length >= 2 && activeMonthPosts >= 2) {
                    const timeDiff = Math.abs(dates[0] - dates[1]) / (1000 * 60 * 60 * 24);
                    if (timeDiff <= 3) score += 30; 
                    else if (timeDiff <= 7) score += 20;
                    else score += 10;
                } else {
                    score += 5; 
                }

                // 🏆 등급 최종 매치업
                let grade = "일반 블로그";
                if (score >= 85) grade = "최적화";
                else if (score >= 60) grade = "준최 최상위";
                else if (score >= 35) grade = "준최 등급";
                else grade = "일반 블로그";

                document.getElementById('circleScore').innerText = `${score}점`;
                document.getElementById('circleChart').style.background = `conic-gradient(#03cf5d ${score}%, #21262d ${score}% 100%)`;
                document.getElementById('postContainer').innerHTML = postHtml;
                document.getElementById('blogGrade').innerText = grade;
                document.getElementById('statusText').innerText = "정상";
                document.getElementById('statusText').style.color = "#03cf5d";
                
                document.getElementById('loader').style.display = "none";
                document.getElementById('dashboard').style.display = "block";

            } catch (error) {
                const fallbackScore = 55; 
                document.getElementById('collectedCount').innerText = "지연";
                document.getElementById('blogGreeting').innerText = "네이버 블로그";
                document.getElementById('circleScore').innerText = `${fallbackScore}점`;
                document.getElementById('circleChart').style.background = `conic-gradient(#03cf5d ${fallbackScore}%, #21262d ${fallbackScore}% 100%)`;
                document.getElementById('blogGrade').innerText = "분석 일반";
                document.getElementById('statusText').innerText = "지연 (실시간 우회)";
                document.getElementById('statusText').style.color = "#8b949e";
                document.getElementById('postContainer').innerHTML = `
                    <li class="post-item"><div class="post-badge">!</div><div class="post-content"><a href="https://blog.naver.com/${id}" target="_blank">네이버 블로그 홈 링크 바로가기</a></div></li>`;
                document.getElementById('loader').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
            }
        }
    </script>
</body>
</html>
