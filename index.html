<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B랭크로그 | BrankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .brand-logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .brand-logo-area img {
            height: 32px;
            width: auto;
            display: block;
        }
        .brand-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-transform: uppercase;
        }
        .main-sub {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 35px;
        }
        .search-section {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }
        .input-group {
            text-align: left;
        }
        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: #8b949e; 
            margin-bottom: 12px;
            display: block;
        }
        .search-box {
            display: flex;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 6px;
            align-items: center;
        }
        .search-box input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            padding: 10px 12px;
            font-size: 15px;
            width: 100%;
        }
        .search-box input::placeholder {
            color: #484f58;
        }
        .btn-naver {
            background: #03cf5d;
            color: #ffffff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap; /* 모바일 한 줄 정렬 방어 */
            flex-shrink: 0;
        }
        .btn-naver:hover {
            opacity: 0.9;
        }
        .footer-notice {
            font-size: 11px;
            color: #6e7681;
            line-height: 1.6;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="brand-logo-area">
            <img src="logo.svg" alt="BrankLog Logo">
            <span class="brand-text">Brank<span style="color: #03cf5d;">Log.</span></span>
        </div>
        <p class="main-sub">네이버 블로그 실시간 빅데이터 지수 분석 플랫폼</p>

        <div class="search-section">
            <div class="input-group">
                <span class="input-label">블로그 지수 분석 (Naver)</span>
                <div class="search-box">
                    <input type="text" id="blogId" placeholder="네이버 블로그 아이디 입력" onkeypress="if(event.keyCode==13) startAnalysis()">
                    <button class="btn-naver" onclick="startAnalysis()">분석하기</button>
                </div>
            </div>
        </div>

        <p class="footer-notice">
            아이디 입력 시 해당 블로그의 최근 30일 활성 데이터 스코어 및<br>
            종합 노출 가중치 리포트를 실시간으로 파싱하여 제공합니다.
        </p>
    </div>

    <script>
        function startAnalysis() {
            const id = document.getElementById('blogId').value.trim();
            if (!id) return alert('네이버 블로그 아이디를 입력해주세요.');
            location.href = `result.html?blogId=${encodeURIComponent(id)}`;
        }
    </script>
</body>
</html>
